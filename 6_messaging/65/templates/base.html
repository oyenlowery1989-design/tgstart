<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}GhostMirror Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="warning-banner">
      ⚠️ CAUTION: Local only! Do NOT expose this dashboard to the public
      internet.
    </div>

    <div class="navbar">
      <a href="/">Dashboard</a>
      <a href="/chats">Chats</a>
      <a href="/setup">Setup</a>
      <a href="/events">Events</a>
      <a href="/users">Users</a>
    </div>

    <div class="container">{% block content %}{% endblock %}</div>

    <script>
      async function fetchPost(url) {
        try {
          const response = await fetch(url, { method: "POST" });
          if (!response.ok) {
            alert("Action failed: " + response.statusText);
            return false;
          }
          return true;
        } catch (err) {
          alert("Network error: " + err);
          return false;
        }
      }

      async function toggleConfig(chatId, key, isChecked) {
        // Optimistic UI update handled by toggle switch input naturally
        // If fail, we should revert... but for simplicity in v1 we assume success or alert
        const success = await fetchPost(
          `/api/toggle/${chatId}/${key}?value=${isChecked ? 1 : 0}`,
        );
        if (!success) {
          // simple revert if needed, or reload
          window.location.reload();
        }
      }

      async function toggleMonitor(chatId, isChecked) {
        const success = await fetchPost(
          `/api/chats/${chatId}/monitor?value=${isChecked ? 1 : 0}`,
        );
        if (!success) window.location.reload();
      }
    </script>
  </body>
</html>
